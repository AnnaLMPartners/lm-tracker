<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LM Real Estate Partners — Date Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"><\/script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2e45;
    --navy-light: #243d57;
    --gold: #c8973a;
    --gold-light: #e8b55a;
    --gold-pale: #fdf3e3;
    --cream: #f8f5f0;
    --white: #ffffff;
    --text-primary: #0d1b2a;
    --text-secondary: #4a5568;
    --text-muted: #8a9bb0;
    --border: #e2e8f0;
    --border-strong: #cbd5e0;
    --red: #c53030;
    --red-bg: #fff5f5;
    --red-border: #feb2b2;
    --amber: #b7791f;
    --amber-bg: #fffbeb;
    --amber-border: #f6e05e;
    --green: #276749;
    --green-bg: #f0fff4;
    --green-border: #9ae6b4;
    --sidebar-w: 240px;
    --header-h: 64px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    height: var(--header-h);
    background: var(--navy);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    border-bottom: 1px solid var(--navy-light);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    font-size: 18px;
    color: var(--navy);
    font-weight: 400;
    letter-spacing: -0.5px;
  }
  .logo-text {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--white);
    letter-spacing: 0.3px;
  }
  .logo-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header-date {
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .avatar {
    width: 32px; height: 32px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--navy);
    cursor: pointer;
  }

  /* ── SIDEBAR ── */
  .layout {
    display: flex;
    padding-top: var(--header-h);
    min-height: 100vh;
  }
  sidebar, .sidebar {
    width: var(--sidebar-w);
    background: var(--navy);
    position: fixed;
    top: var(--header-h);
    left: 0;
    bottom: 0;
    overflow-y: auto;
    padding: 24px 0 40px;
    border-right: 1px solid var(--navy-light);
  }
  .nav-section {
    padding: 0 16px 8px;
    font-size: 10px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 20px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    font-size: 13.5px;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    text-decoration: none;
  }
  .nav-item:hover { color: var(--white); background: rgba(255,255,255,0.06); }
  .nav-item.active {
    color: var(--gold-light);
    border-left-color: var(--gold);
    background: rgba(200, 151, 58, 0.1);
  }
  .nav-icon { font-size: 16px; }

  /* ── MAIN ── */
  main {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 32px 36px;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--navy);
    font-weight: 400;
    line-height: 1.2;
  }
  .page-subtitle {
    font-size: 13.5px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .btn {
    padding: 9px 18px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }
  .btn-primary {
    background: var(--navy);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--navy-mid); }
  .btn-gold {
    background: var(--gold);
    color: var(--navy);
  }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-outline {
    background: transparent;
    color: var(--text-primary);
    border: 1px solid var(--border-strong);
  }
  .btn-outline:hover { background: var(--white); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }

  /* ── STATS STRIP ── */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card.urgent::before { background: var(--red); }
  .stat-card.warning::before { background: var(--amber); }
  .stat-card.ok::before { background: var(--green); }
  .stat-card.info::before { background: var(--navy); }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; }
  .stat-value { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--navy); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 24px;
    width: fit-content;
  }
  .tab {
    padding: 8px 18px;
    font-size: 13.5px;
    font-weight: 500;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text-secondary);
    transition: all 0.15s;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
  }
  .tab:hover { color: var(--text-primary); }
  .tab.active { background: var(--navy); color: var(--white); }

  /* ── FILTERS ROW ── */
  .filters-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .search-box {
    flex: 1;
    max-width: 280px;
    position: relative;
  }
  .search-box input {
    width: 100%;
    padding: 8px 12px 8px 34px;
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--text-primary);
    outline: none;
  }
  .search-box input:focus { border-color: var(--navy); }
  .search-icon {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    font-size: 15px;
    color: var(--text-muted);
  }
  select.filter-select {
    padding: 8px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--text-primary);
    outline: none;
    cursor: pointer;
  }
  select.filter-select:focus { border-color: var(--navy); }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead th {
    background: #f8f9fb;
    padding: 11px 16px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-secondary);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbfc; }
  td { padding: 13px 16px; vertical-align: middle; }

  /* ── BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }
  .badge-red { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid var(--amber-border); }
  .badge-green { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }
  .badge-navy { background: #eef2f7; color: var(--navy); border: 1px solid #c9d6e3; }
  .badge-gold { background: var(--gold-pale); color: #92600f; border: 1px solid #e8c97a; }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .dot-red { background: var(--red); }
  .dot-amber { background: var(--amber); }
  .dot-green { background: var(--green); }

  /* ── PROPERTY BADGE ── */
  .prop-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .prop-icon {
    width: 30px; height: 30px;
    background: #eef2f7;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: var(--navy);
    flex-shrink: 0;
  }
  .prop-name { font-weight: 500; color: var(--text-primary); }
  .prop-loc { font-size: 11.5px; color: var(--text-muted); margin-top: 1px; }

  /* ── DAYS PILL ── */
  .days-pill {
    font-size: 13px;
    font-weight: 600;
  }
  .days-urgent { color: var(--red); }
  .days-warning { color: var(--amber); }
  .days-ok { color: var(--green); }

  /* ── ACTION ROW ── */
  .action-btns { display: flex; gap: 6px; }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(13,27,42,0.55);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 14px;
    width: 100%;
    max-width: 620px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .modal-header {
    padding: 22px 26px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
  }
  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--navy);
    font-weight: 400;
  }
  .modal-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }
  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-muted);
    cursor: pointer;
    line-height: 1;
    padding: 0;
  }
  .modal-close:hover { color: var(--text-primary); }
  .modal-body { padding: 22px 26px; }
  .modal-footer {
    padding: 16px 26px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-secondary);
  }
  .form-input, .form-select {
    padding: 9px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    font-size: 13.5px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-primary);
    background: var(--white);
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input:focus, .form-select:focus { border-color: var(--navy); }
  .form-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-muted);
    padding: 6px 0 4px;
    border-bottom: 1px solid var(--border);
    margin: 4px 0 4px;
    grid-column: 1 / -1;
  }
  .reminder-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    grid-column: 1 / -1;
  }
  .reminder-chip {
    padding: 5px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    background: var(--white);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
  }
  .reminder-chip.selected {
    background: var(--navy);
    color: var(--white);
    border-color: var(--navy);
  }

  /* ── SECTION ── */
  .section { display: none; }
  .section.active { display: block; }

  /* ── CALENDAR VIEW ── */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-top: 8px;
  }
  .cal-month-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .cal-month-header {
    background: var(--navy);
    color: var(--white);
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .cal-events { padding: 10px 14px; }
  .cal-event {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .cal-event:last-child { border-bottom: none; }
  .cal-day {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .cal-day-red { background: var(--red-bg); color: var(--red); }
  .cal-day-amber { background: var(--amber-bg); color: var(--amber); }
  .cal-day-navy { background: #eef2f7; color: var(--navy); }
  .cal-event-text { font-size: 12.5px; line-height: 1.4; }
  .cal-event-prop { font-weight: 500; color: var(--text-primary); }
  .cal-event-type { font-size: 11px; color: var(--text-muted); }

  /* ── PROPERTY CARDS ── */
  .props-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .prop-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .prop-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); transform: translateY(-1px); }
  .prop-card-header {
    background: var(--navy);
    padding: 16px 18px;
    position: relative;
  }
  .prop-card-name {
    font-family: 'DM Serif Display', serif;
    font-size: 15px;
    color: var(--white);
    font-weight: 400;
  }
  .prop-card-market {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .prop-card-status {
    position: absolute;
    top: 14px; right: 14px;
  }
  .prop-card-body { padding: 14px 18px; }
  .prop-metric {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
  }
  .prop-metric:last-child { border-bottom: none; }
  .prop-metric-label { color: var(--text-muted); }
  .prop-metric-value { font-weight: 500; color: var(--text-primary); }
  .prop-card-footer {
    padding: 10px 18px;
    background: #f8f9fb;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 6px;
    justify-content: flex-end;
  }

  /* ── NOTIFICATIONS PANEL ── */
  .notif-banner {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-mid) 100%);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    color: var(--white);
  }
  .notif-icon {
    width: 44px; height: 44px;
    background: var(--gold);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: var(--navy);
    flex-shrink: 0;
  }
  .notif-text h3 { font-size: 14px; font-weight: 600; }
  .notif-text p { font-size: 12.5px; color: rgba(255,255,255,0.7); margin-top: 3px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-title { font-size: 15px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 28px; right: 28px;
    background: var(--navy);
    color: var(--white);
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 500;
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ── */
  @media (max-width: 1100px) {
    .stats-strip { grid-template-columns: repeat(2, 1fr); }
    .props-grid { grid-template-columns: repeat(2, 1fr); }
    .cal-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark">LM</div>
    <div>
      <div class="logo-text">LM Real Estate Partners</div>
      <div class="logo-sub">Asset Management Platform</div>
    </div>
  </div>
  <div class="header-right">
    <span class="header-date" id="todayDate"></span>
    <div class="avatar" title="Account">JD</div>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="nav-section">Navigation</div>
    <a class="nav-item active" onclick="showSection('dashboard')">
      <span class="nav-icon">⊞</span> Dashboard
    </a>
    <a class="nav-item" onclick="showSection('loans')">
      <span class="nav-icon">⬡</span> Loan Agreements
    </a>
    <a class="nav-item" onclick="showSection('deals')">
      <span class="nav-icon">◈</span> Deal Pipeline
    </a>
    <a class="nav-item" onclick="showSection('properties')">
      <span class="nav-icon">▦</span> Properties
    </a>
    <div class="nav-section">Tools</div>
    <a class="nav-item" onclick="showSection('calendar')">
      <span class="nav-icon">◻</span> Calendar View
    </a>
    <a class="nav-item" onclick="exportICS()">
      <span class="nav-icon">↓</span> Export to Calendar
    </a>
    <a class="nav-item" onclick="showSection('reminders')">
      <span class="nav-icon">◎</span> Email Reminders
    </a>
    <a class="nav-item" onclick="showSection('settings')">
      <span class="nav-icon">⚙</span> Settings
    </a>
  </div>

  <!-- MAIN -->
  <main>

    <!-- ── DASHBOARD ── -->
    <div class="section active" id="section-dashboard">
      <div class="page-header">
        <div>
          <div class="page-title">Good morning, Team</div>
          <div class="page-subtitle">Here's your critical date summary across all 12 properties.</div>
        </div>
        <div style="display:flex;gap:10px;">

// ── HELPERS ──
const today = new Date();
today.setHours(0,0,0,0);

function daysUntil(dateStr) {
  const d = new Date(dateStr);
  d.setHours(0,0,0,0);
  return Math.ceil((d - today) / 86400000);
}
function fmtDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function fmtMoney(n) {
  if (!n) return '—';
  return '$' + Number(n).toLocaleString();
}
function statusBadge(days) {
  if (days <= 0) return `<span class="badge badge-red"><span class="dot dot-red"></span> Overdue</span>`;
  if (days <= 30) return `<span class="badge badge-red"><span class="dot dot-red"></span> Urgent</span>`;
  if (days <= 90) return `<span class="badge badge-amber"><span class="dot dot-amber"></span> Watch</span>`;
  return `<span class="badge badge-green"><span class="dot dot-green"></span> On Track</span>`;
}
function daysCell(days) {
  if (days <= 0) return `<span class="days-pill days-urgent">Overdue</span>`;
  const cls = days <= 30 ? 'days-urgent' : days <= 90 ? 'days-warning' : 'days-ok';
  return `<span class="days-pill ${cls}">${days}d</span>`;
}
function propName(id) {
  const p = STATE.properties.find(x => x.id == id);
  return p ? p.name : '—';
}
function propCell(id) {
  const p = STATE.properties.find(x => x.id == id);
  if (!p) return '—';
  return `<div class="prop-cell"><div class="prop-icon">🏭</div><div><div class="prop-name">${p.name}</div><div class="prop-loc">${p.city}, ${p.state}</div></div></div>`;
}
function allDates() {
  const arr = [];
  STATE.loans.forEach(l => arr.push({ type:'loan', ...l }));
  STATE.deals.forEach(d => arr.push({ type:'deal', ...d }));
  return arr.sort((a,b) => new Date(a.date) - new Date(b.date));
}

function showSection(s) {
  document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
  document.getElementById('section-' + s).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  event && event.currentTarget && event.currentTarget.classList.add('active');
  STATE.activeSection = s;
  if (s === 'dashboard') renderDashboard();
  if (s === 'loans') renderLoans();
  if (s === 'deals') renderDeals();
  if (s === 'properties') renderProperties();
  if (s === 'calendar') renderCalendar();
  if (s === 'reminders') renderReminders();
}

// ── DASHBOARD ──
function renderDashboard() {
  const all = allDates();
  const urgent = all.filter(r => { const d = daysUntil(r.date); return d >= 0 && d <= 30; }).length;
  const warning = all.filter(r => { const d = daysUntil(r.date); return d > 30 && d <= 90; }).length;
  const ok = all.filter(r => daysUntil(r.date) > 90).length;
  document.getElementById('stat-urgent').textContent = urgent;
  document.getElementById('stat-warning').textContent = warning;
  document.getElementById('stat-ok').textContent = ok;
  document.getElementById('stat-total').textContent = all.length;
  document.getElementById('stat-props-sub').textContent = `${STATE.properties.length} properties tracked`;
  document.getElementById('urgentBannerText').textContent =
    urgent > 0 ? `⚠ ${urgent} date${urgent>1?'s':''} require attention within 30 days` : `✓ No critical deadlines in the next 30 days`;
  renderDashboardTable();
}
function filterDashboard(f, el) {

  tbody.innerHTML = rows.map(r => {

// ── CALENDAR ──
function renderCalendar() {
  const all = allDates().filter(r => daysUntil(r.date) > -30);
  const months = {};
  all.forEach(r => {
    const d = new Date(r.date + 'T00:00:00');
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    if (!months[key]) months[key] = [];
    months[key].push(r);
  });
  const grid = document.getElementById('calGrid');
  const keys = Object.keys(months).sort().slice(0,9);
  if (!keys.length) { grid.innerHTML = '<p style="color:var(--text-muted);">No upcoming dates.</p>'; return; }
  grid.innerHTML = keys.map(k => {
    const [yr, mo] = k.split('-');
    const label = new Date(yr, mo-1, 1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    const events = months[k];
    return `<div class="cal-month-card">
      <div class="cal-month-header">${label} <span style="font-size:11px;opacity:0.6;margin-left:6px;">${events.length} date${events.length>1?'s':''}</span></div>
      <div class="cal-events">
        ${events.map(r => {
          const d = new Date(r.date+'T00:00:00');
          const days = daysUntil(r.date);
          const dayClass = days <= 30 ? 'cal-day-red' : days <= 90 ? 'cal-day-amber' : 'cal-day-navy';
          const label = r.type==='loan' ? r.type.charAt(0).toUpperCase()+r.type.slice(1) + ': ' + r.type_ : r.milestone;
          return `<div class="cal-event">
            <div class="cal-day ${dayClass}">${d.getDate()}</div>
            <div class="cal-event-text">
              <div class="cal-event-prop">${propName(r.propId)}</div>
              <div class="cal-event-type">${r.type==='loan'?r.type:r.dealType} — ${r.type==='loan'?r.type:r.milestone}</div>
            </div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

// ── ICS EXPORT ──
function icsDate(dateStr) {
  return dateStr.replace(/-/g,'') + 'T090000Z';
}
function exportSingleICS(dateStr, title, prop) {
  const uid = Date.now() + '@lmrep';
  const content = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//LM Real Estate Partners//Date Tracker//EN',
    'BEGIN:VEVENT',
    `UID:${uid}`,
    `DTSTART;VALUE=DATE:${dateStr.replace(/-/g,'')}`,
    `SUMMARY:[LM] ${title} — ${prop}`,
    `DESCRIPTION:Key date tracked by LM Real Estate Partners Asset Management Platform`,
    'END:VEVENT','END:VCALENDAR'
  ].join('\r\n');
  downloadFile('lm-date.ics', content, 'text/calendar');
  showToast('Calendar event exported ✓');
}
function exportICS() {
  const all = allDates();
  const events = all.map(r => {
    const uid = r.type + r.id + '@lmrep';
    const title = r.type === 'loan' ? `[Loan] ${r.type} — ${propName(r.propId)}` : `[${r.dealType}] ${r.milestone} — ${propName(r.propId)}`;
    return [
      'BEGIN:VEVENT',
      `UID:${uid}`,
      `DTSTART;VALUE=DATE:${r.date.replace(/-/g,'')}`,
      `SUMMARY:${title}`,
      `DESCRIPTION:${r.notes || ''}`,
      'END:VEVENT'
    ].join('\r\n');
  }).join('\r\n');
  const content = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//LM Real Estate Partners//Date Tracker//EN\r\nCALSCALE:GREGORIAN\r\n${events}\r\nEND:VCALENDAR`;
  downloadFile('LM-CriticalDates.ics', content, 'text/calendar');
  showToast(`Exported ${all.length} dates to calendar ✓`);
}
function downloadFile(name, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = name;
  a.click();
}

// ── TOAST ──
function showToast(msg) {
